<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pharmacy Manager Pro - إدارة صيدليتي</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c7da0">
    <link rel="stylesheet" href="style.css">
    <!-- External libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

    <!-- Login Section -->
    <div id="loginSection" class="login-section">
        <div class="login-card">
            <h2>📋 Pharmacy Manager Pro</h2>
            <p>تسجيل الدخول لإدارة صيدليتك</p>
            <input type="text" id="loginEmail" placeholder="البريد الإلكتروني" class="login-input">
            <input type="password" id="loginPassword" placeholder="كلمة المرور" class="login-input">
            <button id="loginBtn" class="save-btn">تسجيل الدخول</button>
            <button id="registerBtn" class="save-btn secondary">إنشاء حساب جديد</button>
            <div id="loginMessage" class="login-message"></div>
        </div>
    </div>

    <!-- Main App Section -->
    <div id="appSection" style="display: none;">
        <div class="header">
            <div class="profile-menu-container">
                <div id="profileIcon" class="profile-icon" onclick="toggleProfileMenu()">👤</div>
                <div id="profileMenu" class="profile-dropdown">
                    <div class="profile-info" id="profileInfo">
                        <img id="profileImg" src="" alt="صورة المستخدم">
                        <span id="profileName"></span>
                    </div>
                    <div class="dropdown-item" onclick="openProfileEdit()">👤 الملف الشخصي</div>
                    <div class="dropdown-item" onclick="openSettings()">⚙️ الإعدادات</div>
                    <div class="dropdown-item" onclick="showAbout()">ℹ️ حول التطبيق</div>
                    <div class="dropdown-item" onclick="logout()">🚪 تسجيل خروج</div>
                </div>
            </div>
            <div class="title" id="pageTitle">📦 كل الأدوية</div>
            <button class="notif-btn" onclick="showNotifications()">🔔<span id="notifBadge" class="notif-badge" style="display:none;">0</span></button>
        </div>

        <div class="main-buttons">
            <button class="main-btn" data-view="all">📦 كل الأدوية</button>
            <button class="main-btn" data-view="pharmacy">🏥 أدوية الصيدلية</button>
            <button class="main-btn" data-view="categories">📂 التصنيفات العلاجية</button>
            <button class="main-btn" data-view="companies">🏭 الشركات الدولية</button>
            <button class="main-btn" data-view="expiring">⚠️ الأدوية القريبة</button>
            <button class="main-btn" data-view="add">➕ إضافة دواء</button>
        </div>

        <div id="dynamicContent">
            <!-- dynamic content -->
        </div>
        <div id="stats"></div>
        <div class="chart-container" id="chartContainer" style="display: none;">
            <canvas id="expiryChart" width="400" height="200"></canvas>
        </div>
    </div>

    <!-- Modals -->
    <div id="profileEditModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('profileEditModal')">✖</span><h3>تعديل الملف الشخصي</h3><div class="edit-profile-form"><input type="text" id="editName" placeholder="الاسم"><input type="file" id="editImage" accept="image/*"><button class="save-btn" onclick="saveProfile()">حفظ التغييرات</button></div></div></div>
    <div id="settingsModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('settingsModal')">✖</span><h3>الإعدادات</h3><div class="settings-item" onclick="toggleDarkMode()">🌙 الوضع المظلم</div><div class="settings-item" onclick="exportCSV()">📄 تصدير CSV</div><div class="settings-item" onclick="exportPDF()">📑 تصدير PDF</div></div></div>
    <div id="notifModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('notifModal')">✖</span><h3>الإشعارات</h3><div id="notifList"></div></div></div>
    <div id="medModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('medModal')">✖</span><div id="medDetail"></div><div class="modal-buttons"><button class="edit-btn" onclick="editCurrentMed()">تعديل</button><button class="delete-btn" onclick="deleteCurrentMed()">حذف</button></div></div></div>
    <div id="editModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('editModal')">✖</span><h3>تعديل الدواء</h3><div id="editFormContainer"></div><button class="save-btn" onclick="saveEditMed()">حفظ</button></div></div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(console.log);
        }
    </script>
</body>
</html>
